version: 2
updates:
- package-ecosystem: nuget
  directory: "/"
  schedule:
    interval: daily
    time: "04:00"
  open-pull-requests-limit: 10
  assignees:
  - fredrikhr
  ignore:
  - dependency-name: Microsoft.Build
    versions:
    - ">= 16.0.461.a, < 16.0.462"
  - dependency-name: Microsoft.NET.Test.Sdk
    versions:
    - 16.8.3
    - 16.9.1
  - dependency-name: coverlet.collector
    versions:
    - 3.0.2
- package-ecosystem: gitsubmodule
  directory: "/"
  schedule:
    interval: daily
    time: "04:00"
  open-pull-requests-limit: 10
  assignees:
  - fredrikhr
- package-ecosystem: npm
  directory: "/src/THNETII.AzureDevOps.Pipelines.GitHubTaskLibrary"
  schedule:
    interval: daily
    time: "04:00"
  open-pull-requests-limit: 10
  assignees:
  - fredrikhr
  ignore:
  - dependency-name: tfx-cli
    versions:
    - 0.9.0
    - 0.9.2
- package-ecosystem: npm
  directory: "/src/THNETII.AzureDevOps.Pipelines.GitHubTaskLibrary/githubaccesstokentask"
  schedule:
    interval: daily
    time: "04:00"
  open-pull-requests-limit: 10
  assignees:
  - fredrikhr
  ignore:
  - dependency-name: azure-pipelines-task-lib
    versions:
    - 2.12.1
    - 2.12.2
    - 3.1.0
    - 3.1.1
  - dependency-name: typescript
    versions:
    - 4.1.3
    - 4.1.4
    - 4.1.5
    - 4.2.2
    - 4.2.3
